{% extends 'base.html' %}
{% block content %}
<style>
  .news-wrap { margin-top: 22px; }

  .content-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .cover {
    width: 100%;
    height: 390px;
    object-fit: cover;
    background: #f2f6fb;
  }

  .article-body { padding: 18px; }
  .title { margin: 10px 0 6px; font-size: clamp(1.6rem, 3.4vw, 2.2rem); letter-spacing: -0.4px; }
  .meta { color: var(--muted); font-size: 0.88rem; }
  .content {
    margin-top: 14px;
    color: #2e4258;
    line-height: 1.84;
    white-space: pre-line;
    font-size: 0.95rem;
  }

  .side-box {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 14px;
    box-shadow: var(--shadow-sm);
    position: sticky;
    top: 94px;
  }

  .side-box h5 { margin-bottom: 10px; }

  .side-item {
    display: block;
    color: #294763;
    text-decoration: none;
    padding: 10px 2px;
    border-bottom: 1px solid #eaf1f8;
    font-weight: 600;
  }

  .side-item:last-child { border-bottom: 0; }
</style>

<div class="news-wrap">
  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('main.news_list') }}">Về tin tức</a>
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('main.index') }}">Về trang chủ</a>
  </div>

  <div class="row g-4">
    <div class="col-lg-8">
      <article class="content-card">
        <img class="cover" src="{{ post.image_url or 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200' }}" alt="{{ post.title }}">
        <div class="article-body">
          <h1 class="title">{{ post.title }}</h1>
          <div class="meta">{{ post.published_at.strftime('%d/%m/%Y %H:%M') }}</div>
          <div class="content">{{ post.content }}</div>
        </div>
      </article>
    </div>

    <div class="col-lg-4">
      <aside class="side-box">
        <h5>Bài viết mới</h5>
        {% for item in latest %}
        <a class="side-item" href="{{ url_for('main.news_detail', slug=item.slug) }}">{{ item.title }}</a>
        {% else %}
        <p class="text-muted mb-0">Chưa có bài viết khác.</p>
        {% endfor %}
      </aside>
    </div>
  </div>
</div>
{% endblock %}
