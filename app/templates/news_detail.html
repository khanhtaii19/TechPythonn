{% extends 'base.html' %}
{% block content %}

<style>
    .news-wrap { padding-top: 28px; }
    .cover { width: 100%; height: 360px; object-fit: cover; border-radius: 14px; border: 1px solid var(--border); }
    .title { font-family: 'Syne', sans-serif; color: var(--white); font-size: 2rem; margin: 18px 0 8px; }
    .meta { color: var(--muted); margin-bottom: 18px; }
    .content { color: var(--text); line-height: 1.8; white-space: pre-line; }

    .side-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
    .side-item { display: block; color: var(--text); text-decoration: none; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .side-item:last-child { border-bottom: 0; }
</style>

<div class="news-wrap"><div class="d-flex justify-content-between align-items-center mb-3"><a class="btn btn-outline-light btn-sm" href="{{ url_for('main.news_list') }}">Ve tin tuc</a><a class="btn btn-outline-light btn-sm" href="{{ url_for('main.index') }}">Ve trang chu</a></div>
    <div class="row g-4">
        <div class="col-lg-8">
            <img class="cover" src="{{ post.image_url or 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200' }}" alt="{{ post.title }}">
            <h1 class="title">{{ post.title }}</h1>
            <div class="meta">{{ post.published_at.strftime('%d/%m/%Y %H:%M') }}</div>
            <div class="content">{{ post.content }}</div>
        </div>
        <div class="col-lg-4">
            <div class="side-box">
                <h5 class="mb-3">Bai viet moi</h5>
                {% for item in latest %}
                <a class="side-item" href="{{ url_for('main.news_detail', slug=item.slug) }}">{{ item.title }}</a>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

{% endblock %}
