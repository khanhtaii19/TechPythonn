{% extends 'base.html' %}
{% block content %}
<style>.panel{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px} td,th{padding:8px 6px;border-bottom:1px solid var(--border)}</style>
<div class="d-flex justify-content-between align-items-center mt-4 mb-3 flex-wrap gap-2">
  <h2 style="font-family:'Syne',sans-serif;margin:0;">CRUD Product</h2>
  <div>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_dashboard') }}">Dashboard</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_categories') }}">Category</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_variants') }}">Variant</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_news') }}">News</a>
  </div>
</div>
<div class="panel">
  <form method="post" action="{{ url_for('main.admin_products') }}" class="row g-2">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="col-md-3"><input class="form-control" name="name" placeholder="Ten product" required></div>
    <div class="col-md-2">
      <select class="form-control" name="category_id">
        <option value="">Category</option>
        {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-md-2"><input class="form-control" name="price" type="number" step="0.01" placeholder="Price"></div>
    <div class="col-md-2"><input class="form-control" name="stock" type="number" placeholder="Stock"></div>
    <div class="col-md-3"><input class="form-control" name="image_url" placeholder="Image URL"></div>
    <div class="col-12"><textarea class="form-control" name="description" rows="2" placeholder="Description"></textarea></div>
    <div class="col-12"><button class="btn btn-primary">Them product</button></div>
  </form>
</div>
<div class="panel"><table class="w-100"><thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th></th></tr></thead><tbody>
{% for p in products %}
<tr>
<td>{{ p.id }}</td>
<td><form method="post" action="{{ url_for('main.admin_product_update', product_id=p.id) }}" class="d-flex gap-2 flex-wrap">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input class="form-control" style="min-width:160px" name="name" value="{{ p.name }}">
<select class="form-control" name="category_id" style="max-width:160px">
<option value="">-</option>{% for c in categories %}<option value="{{ c.id }}" {% if p.category_id==c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
</select>
<input class="form-control" style="max-width:120px" type="number" step="0.01" name="price" value="{{ p.price }}">
<input class="form-control" style="max-width:100px" type="number" name="stock" value="{{ p.stock }}">
<input class="form-control" style="min-width:200px" name="image_url" value="{{ p.image_url }}">
<input class="form-control" style="min-width:220px" name="description" value="{{ p.description }}">
<button class="btn btn-sm btn-warning">Luu</button>
</form></td>
<td>{{ p.category.name if p.category else '-' }}</td>
<td>{{ p.price }}</td>
<td>{{ p.stock }}</td>
<td><form method="post" action="{{ url_for('main.admin_product_delete', product_id=p.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-danger">Xoa</button></form></td>
</tr>
{% endfor %}
</tbody></table></div>
{% endblock %}
