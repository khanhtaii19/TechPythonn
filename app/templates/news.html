{% extends 'base.html' %}
{% block content %}

<style>
    .news-head { padding: 28px 0 12px; }
    .news-title { font-family: 'Syne', sans-serif; color: var(--white); font-size: 1.9rem; }

    .news-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        height: 100%;
    }

    .news-card img { width: 100%; height: 200px; object-fit: cover; }
    .news-body { padding: 14px; }
    .news-body h5 { color: var(--white); font-family: 'Syne', sans-serif; font-size: 1.1rem; }
    .news-body p { color: var(--muted); font-size: .9rem; }
    .read-more { color: var(--accent); text-decoration: none; font-weight: 600; }
</style>

<div class="news-head d-flex justify-content-between align-items-center flex-wrap gap-2">
    <h1 class="news-title">Trang Tin Tuc</h1><a class="btn btn-outline-light btn-sm" href="{{ url_for('main.index') }}">Ve trang chu</a>
</div>

<div class="row g-3">
    {% for post in posts %}
    <div class="col-md-6 col-lg-4">
        <div class="news-card">
            <img src="{{ post.image_url or 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200' }}" alt="{{ post.title }}">
            <div class="news-body">
                <div class="text-muted small mb-2">{{ post.published_at.strftime('%d/%m/%Y') }}</div>
                <h5>{{ post.title }}</h5>
                <p>{{ post.summary }}</p>
                <a class="read-more" href="{{ url_for('main.news_detail', slug=post.slug) }}">Doc tiep</a>
            </div>
        </div>
    </div>
    {% else %}
    <div class="col-12">
        <p class="text-muted">Chua co bai viet tin tuc.</p>
    </div>
    {% endfor %}
</div>

{% endblock %}
