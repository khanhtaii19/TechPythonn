{% extends 'base.html' %}
{% block content %}
<style>.panel{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px} td,th{padding:8px 6px;border-bottom:1px solid var(--border)}</style>
<div class="d-flex justify-content-between align-items-center mt-4 mb-3 flex-wrap gap-2">
  <h2 style="font-family:'Syne',sans-serif;margin:0;">CRUD News</h2>
  <div>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_dashboard') }}">Dashboard</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_categories') }}">Category</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_products') }}">Product</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_variants') }}">Variant</a>
  </div>
</div>
<div class="panel">
  <form method="post" action="{{ url_for('main.admin_news') }}" class="row g-2">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="col-md-6"><input class="form-control" name="title" placeholder="Title" required></div>
    <div class="col-md-6"><input class="form-control" name="slug" placeholder="Slug (de trong de tu tao)"></div>
    <div class="col-md-12"><input class="form-control" name="summary" placeholder="Summary"></div>
    <div class="col-md-12"><input class="form-control" name="image_url" placeholder="Image URL"></div>
    <div class="col-md-12"><textarea class="form-control" rows="3" name="content" placeholder="Content"></textarea></div>
    <div class="col-12"><button class="btn btn-primary">Them bai viet</button></div>
  </form>
</div>
<div class="panel"><table class="w-100"><thead><tr><th>ID</th><th>Title</th><th>Slug</th><th></th></tr></thead><tbody>
{% for n in posts %}
<tr>
<td>{{ n.id }}</td>
<td>
<form method="post" action="{{ url_for('main.admin_news_update', news_id=n.id) }}" class="d-flex gap-2 flex-wrap">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<input class="form-control" style="min-width:220px" name="title" value="{{ n.title }}">
<input class="form-control" style="min-width:160px" name="slug" value="{{ n.slug }}">
<input class="form-control" style="min-width:220px" name="summary" value="{{ n.summary }}">
<input class="form-control" style="min-width:220px" name="image_url" value="{{ n.image_url }}">
<input class="form-control" style="min-width:320px" name="content" value="{{ n.content }}">
<button class="btn btn-sm btn-warning">Luu</button>
</form>
</td>
<td>{{ n.slug }}</td>
<td><form method="post" action="{{ url_for('main.admin_news_delete', news_id=n.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-danger">Xoa</button></form></td>
</tr>
{% endfor %}
</tbody></table></div>
{% endblock %}
