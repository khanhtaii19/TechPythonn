{% extends 'base.html' %}
{% block content %}
<style>.panel{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:14px} td,th{padding:8px 6px;border-bottom:1px solid var(--border)}</style>
<div class="d-flex justify-content-between align-items-center mt-4 mb-3 flex-wrap gap-2">
  <h2 style="font-family:'Syne',sans-serif;margin:0;">CRUD Variant</h2>
  <div>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_dashboard') }}">Dashboard</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_categories') }}">Category</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_products') }}">Product</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_news') }}">News</a>
  </div>
</div>
<div class="panel">
  <form method="post" action="{{ url_for('main.admin_variants') }}" class="row g-2">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="col-md-3"><select class="form-control" name="product_id" required>{% for p in products %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}</select></div>
    <div class="col-md-3"><input class="form-control" name="label" placeholder="Label" required></div>
    <div class="col-md-2"><input class="form-control" name="price_delta" type="number" step="0.01" placeholder="+ Price"></div>
    <div class="col-md-2"><input class="form-control" name="stock" type="number" placeholder="Stock"></div>
    <div class="col-md-2"><input class="form-control" name="sku" placeholder="SKU"></div>
    <div class="col-12"><button class="btn btn-primary">Them variant</button></div>
  </form>
</div>
<div class="panel"><table class="w-100"><thead><tr><th>ID</th><th>Variant</th><th>Product</th><th>Delta</th><th>Stock</th><th>SKU</th><th></th></tr></thead><tbody>
{% for v in variants %}
<tr>
<td>{{ v.id }}</td>
<td>
<form method="post" action="{{ url_for('main.admin_variant_update', variant_id=v.id) }}" class="d-flex gap-2 flex-wrap">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<select class="form-control" name="product_id" style="max-width:180px">{% for p in products %}<option value="{{ p.id }}" {% if v.product_id==p.id %}selected{% endif %}>{{ p.name }}</option>{% endfor %}</select>
<input class="form-control" style="max-width:180px" name="label" value="{{ v.label }}">
<input class="form-control" style="max-width:100px" type="number" step="0.01" name="price_delta" value="{{ v.price_delta }}">
<input class="form-control" style="max-width:90px" type="number" name="stock" value="{{ v.stock }}">
<input class="form-control" style="max-width:150px" name="sku" value="{{ v.sku }}">
<button class="btn btn-sm btn-warning">Luu</button>
</form>
</td>
<td>{{ v.product.name if v.product else '-' }}</td><td>{{ v.price_delta }}</td><td>{{ v.stock }}</td><td>{{ v.sku }}</td>
<td><form method="post" action="{{ url_for('main.admin_variant_delete', variant_id=v.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button class="btn btn-sm btn-danger">Xoa</button></form></td>
</tr>
{% endfor %}
</tbody></table></div>
{% endblock %}
