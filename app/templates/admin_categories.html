{% extends 'base.html' %}
{% block content %}
<style>
  .top { display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap; margin:24px 0 16px; }
  .nav a { margin-right:8px; }
  .panel { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; padding:14px; }
  table { width:100%; }
  td, th { padding:8px 6px; border-bottom:1px solid var(--border); }
</style>
<div class="top">
  <h2 style="font-family:'Syne',sans-serif; margin:0;">CRUD Category</h2>
  <div class="nav">
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_dashboard') }}">Dashboard</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_products') }}">Product</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_variants') }}">Variant</a>
    <a class="btn btn-outline-light btn-sm" href="{{ url_for('main.admin_news') }}">News</a>
  </div>
</div>
<div class="panel mb-3">
  <form method="post" action="{{ url_for('main.admin_categories') }}" class="row g-2">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="col-md-9"><input class="form-control" name="name" placeholder="Ten category" required></div>
    <div class="col-md-3"><button class="btn btn-primary w-100">Them</button></div>
  </form>
</div>
<div class="panel">
  <table>
    <thead><tr><th>ID</th><th>Name</th><th>Slug</th><th></th></tr></thead>
    <tbody>
      {% for c in categories %}
      <tr>
        <td>{{ c.id }}</td>
        <td>
          <form method="post" action="{{ url_for('main.admin_category_update', category_id=c.id) }}" class="d-flex gap-2">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input class="form-control" name="name" value="{{ c.name }}">
            <button class="btn btn-sm btn-warning">Luu</button>
          </form>
        </td>
        <td>{{ c.slug }}</td>
        <td>
          <form method="post" action="{{ url_for('main.admin_category_delete', category_id=c.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <button class="btn btn-sm btn-danger">Xoa</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
